name: Publish Desktop App
run-name: "${{ format('publish desktop {0}', github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name) }}"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish (e.g. v1.4.1)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            platform: mac
            cli-asset: executor-darwin-arm64.zip
          - os: macos-latest
            arch: x64
            platform: mac
            cli-asset: executor-darwin-x64.zip
          - os: ubuntu-latest
            arch: x64
            platform: linux
            cli-asset: executor-linux-x64.tar.gz
          - os: windows-latest
            arch: x64
            platform: win
            cli-asset: executor-windows-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run build
        working-directory: apps/web

      - name: Download and extract CLI sidecar (unix)
        if: matrix.platform != 'win'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p apps/desktop/resources
          gh release download "${{ inputs.tag }}" --repo "${{ github.repository }}" --pattern "${{ matrix.cli-asset }}" --dir /tmp/cli-download
          cd /tmp/cli-download
          if [[ "${{ matrix.cli-asset }}" == *.tar.gz ]]; then
            tar -xzf "${{ matrix.cli-asset }}"
          else
            unzip -o "${{ matrix.cli-asset }}"
          fi
          cp executor "${{ github.workspace }}/apps/desktop/resources/executor"
          chmod +x "${{ github.workspace }}/apps/desktop/resources/executor"
          if [ -f emscripten-module.wasm ]; then
            cp emscripten-module.wasm "${{ github.workspace }}/apps/desktop/resources/"
          fi

      - name: Download and extract CLI sidecar (windows)
        if: matrix.platform == 'win'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "apps/desktop/resources"
          gh release download "${{ inputs.tag }}" --repo "${{ github.repository }}" --pattern "${{ matrix.cli-asset }}" --dir "$env:TEMP/cli-download"
          Expand-Archive -Path "$env:TEMP/cli-download/${{ matrix.cli-asset }}" -DestinationPath "$env:TEMP/cli-extract" -Force
          Copy-Item "$env:TEMP/cli-extract/executor.exe" "apps/desktop/resources/executor.exe"
          if (Test-Path "$env:TEMP/cli-extract/emscripten-module.wasm") {
            Copy-Item "$env:TEMP/cli-extract/emscripten-module.wasm" "apps/desktop/resources/"
          }

      - name: Build desktop app (TypeScript)
        run: bunx tsc -p tsconfig.json
        working-directory: apps/desktop

      - name: Build desktop distributables
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --dir
        working-directory: apps/desktop

      - name: Package (macOS)
        if: matrix.platform == 'mac'
        working-directory: apps/desktop/dist
        run: |
          APP_DIR=$(find . -name "*.app" -maxdepth 2 | head -1)
          if [ -n "$APP_DIR" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_DIR" "Executor-${{ matrix.arch }}-mac.zip"
          fi

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        working-directory: apps/desktop/dist
        run: |
          UNPACKED=$(find . -name "unpacked" -type d -maxdepth 2 | head -1)
          if [ -n "$UNPACKED" ]; then
            tar -czf "Executor-x64-linux.tar.gz" -C "$UNPACKED" .
          fi

      - name: Package (Windows)
        if: matrix.platform == 'win'
        working-directory: apps/desktop/dist
        shell: pwsh
        run: |
          $unpacked = Get-ChildItem -Path . -Filter "win-unpacked" -Directory -Recurse | Select-Object -First 1
          if ($unpacked) {
            Compress-Archive -Path "$($unpacked.FullName)\*" -DestinationPath "Executor-x64-win.zip"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            apps/desktop/dist/Executor-*.zip
            apps/desktop/dist/Executor-*.tar.gz
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) | while read file; do
            echo "Uploading: $file"
            gh release upload "${{ inputs.tag }}" "$file" --repo "${{ github.repository }}" --clobber || true
          done
